<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>SSAFY Mall - 프리미엄 장비 쇼핑몰</title>
    <meta property="og:title" content="SSAFY Mall">
    <meta property="og:description" content="개발자와 직장인을 위한 최고의 장비, SSAFY Mall에서 만나보세요!">
    <meta property="og:image" content="https://ssafymall.onrender.com/uploads/keyboard.jpg">
</head>
<body>
    <div class="container">
        <header class="card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
            <div>
                <h1 style="color:var(--primary); font-weight:800; margin-bottom:5px;">SSAFY Mall</h1>
                
                <div id="user-greeting" style="font-size:1rem; color:var(--text-main); line-height: 1.5;">
                    사용자 정보를 확인 중입니다...
                </div>
            </div>
            
            <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
                <button class="btn btn-outline" onclick="location.href='my-orders.html'">마이페이지</button>
                <button class="btn btn-primary" onclick="location.href='cart.html'">🛒 장바구니</button>
                <button class="btn btn-outline" onclick="location.href='/api/logout'">로그아웃</button>
            </div>
        </header>

        <div style="margin:30px 0;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:1.5rem;">🔥 이달의 추천 상품</h2>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-outline" style="width:auto; padding:5px 15px; font-size:0.9rem;" onclick="loadProducts()">전체보기</button>
                    <button class="btn btn-outline" style="width:auto; padding:5px 15px; font-size:0.9rem;" onclick="filterCategory('전자제품')">가전/디지털</button>
                    <button class="btn btn-outline" style="width:auto; padding:5px 15px; font-size:0.9rem;" onclick="filterCategory('가구')">가구/인테리어</button>
                </div>
            </div>
            <div class="product-grid" id="main-product-grid"></div>
        </div>
        
        <div class="card" style="margin-top:40px; background:#f8fafc; border:none; text-align:center;">
            <h3>💬 궁금한 점이 있으신가요?</h3>
            <p style="color:var(--text-sub); margin-bottom:15px;">고객 센터는 24시간 열려있습니다.</p>
            <button class="btn btn-outline" style="width:auto; padding:10px 30px;" onclick="location.href='qna.html'">Q&A 게시판 바로가기</button>
        </div>
    </div>

    <script>
        async function loadUser() {
            try {
                const res = await fetch('/api/user/me');
                if(!res.ok) return location.href='/';
                const user = await res.json();
                document.getElementById('user-greeting').innerHTML = `
                    👋 안녕하세요, <strong>${user.name}</strong>님!<br>
                    현재 등급은 <span class="badge" style="background:var(--primary); color:white;">${user.grade}</span> 입니다.
                `;
            } catch (error) {
                console.error('사용자 정보 로드 실패:', error);
                location.href='/';
            }
        }

        async function loadProducts(category = null) {
            try {
                const res = await fetch('/api/products');
                let prods = await res.json();
                
                if(category) {
                    prods = prods.filter(p => p.category === category);
                }

                const grid = document.getElementById('main-product-grid');
                if(prods.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; padding:50px; color:var(--text-sub);">상품이 없습니다.</p>';
                    return;
                }

                grid.innerHTML = prods.map(p => `
                    <div class="prod-card" onclick="viewDetail(${p.id})" style="border: 1px solid var(--border); overflow: hidden; border-radius: var(--radius);">
                        <img src="${p.img}" alt="${p.name}" style="width:100%; height:200px; object-fit:cover; display:block;">
                        <div style="padding:20px;">
                            <span class="badge ${p.stock <= 0 ? 'badge-soldout' : 'badge-available'}">
                                ${p.stock <= 0 ? '일시품절' : '판매중'}
                            </span>
                            <h3 style="margin:10px 0;">${p.name}</h3>
                            <p style="color:#ef4444; font-size:1.25rem; font-weight:bold;">${p.price.toLocaleString()}원</p>
                            <p style="font-size:0.875rem; color:var(--text-sub); margin-top:10px;">잔여 재고: ${p.stock}개</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('상품 로드 실패:', error);
            }
        }

        function filterCategory(cat) {
            loadProducts(cat);
        }

        function viewDetail(id) {
            location.href = `detail.html?id=${id}`;
        }

        loadUser();
        loadProducts();
    </script>
</body>
</html>

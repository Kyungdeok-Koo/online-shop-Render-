<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://js.tosspayments.com/v1"></script>
    <title>최종 결제</title>
</head>
<body>
    <div class="container" style="max-width: 550px;">
        <h2 style="margin-bottom:20px;">💳 주문 최종 확인</h2>
        <div class="card" style="line-height:2;">
            <h3 style="border-bottom:2px solid #f1f5f9; padding-bottom:15px; margin-bottom:15px;">배송 정보</h3>
            <p><strong style="color:var(--text-sub); display:inline-block; width:80px;">받는 분:</strong> <span id="d-name" style="font-weight:bold;">로딩중...</span></p>
            <p><strong style="color:var(--text-sub); display:inline-block; width:80px;">연락처:</strong> <span id="d-hp">로딩중...</span></p>
            <p><strong style="color:var(--text-sub); display:inline-block; width:80px;">주소:</strong> <span id="d-addr">로딩중...</span></p>
            
            <hr style="border:0; border-top:1px solid #e2e8f0; margin: 25px 0;">
            
            <div style="margin-bottom:25px;">
                <label style="font-weight:bold; font-size:0.9rem;">🎟️ 프로모션 쿠폰</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" id="coupon-code" placeholder="쿠폰 코드를 입력하세요 (예: PRO2026)">
                    <button class="btn btn-outline" onclick="applyCoupon()" style="white-space:nowrap; margin-top:8px;">적용하기</button>
                </div>
                <p id="coupon-msg" style="font-size:0.85rem; font-weight:bold; margin-top:5px;"></p>
            </div>

            <div style="background:#f8fafc; padding:20px; border-radius:8px; text-align:right;">
                <p style="color:var(--text-sub); font-size:0.9rem;">상품 총액: <span id="d-origin">0</span>원</p>
                <h2 style="color:var(--primary); margin-top:10px;">총 결제금액: <span id="d-total">0</span>원</h2>
            </div>
            
            <button class="btn btn-primary" onclick="requestTossPay()" style="width:100%; height:60px; margin-top:20px; font-size:1.2rem; box-shadow: 0 4px 14px 0 rgba(49,130,246,0.3); background-color:#3182f6; border:none;">🟦 토스페이먼츠로 안전 결제하기</button>
        </div>
    </div>

    <script>
        // 회원님의 원래 클라이언트 키로 완벽히 복구했습니다!
        const clientKey = 'test_ck_D5GePWvyJnrK0W0k6q8gLzN97Eoq';
        const tossPayments = TossPayments(clientKey);

        let originTotal = 0;
        let discountAmount = 0;

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);

            if(urlParams.has('paymentKey') && urlParams.has('orderId')) {
                await processFinalOrder(urlParams.get('amount'));
                return;
            }

            if(urlParams.has('code') && urlParams.has('message')) {
                alert('결제 실패: ' + urlParams.get('message'));
                location.href = 'pay.html';
                return;
            }

            const info = JSON.parse(sessionStorage.getItem('orderInfo'));
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            
            if(!info || cart.length === 0) return location.href='info.html';

            document.getElementById('d-name').innerText = info.name;
            document.getElementById('d-hp').innerText = info.phone;
            document.getElementById('d-addr').innerText = info.address;
            
            originTotal = cart.reduce((s, i) => s + (i.price * i.count), 0);
            updateTotal();
        }

        async function applyCoupon() {
            const code = document.getElementById('coupon-code').value;
            const res = await fetch('/api/check-coupon', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ code }) 
            });
            const data = await res.json();
            
            if(data.success) {
                discountAmount = data.discount;
                const msg = document.getElementById('coupon-msg');
                msg.innerText = `-${discountAmount.toLocaleString()}원 할인이 적용되었습니다!`;
                msg.style.color = '#10b981';
            } else {
                discountAmount = 0;
                const msg = document.getElementById('coupon-msg');
                msg.innerText = data.message;
                msg.style.color = '#ef4444';
            }
            updateTotal();
        }

        function updateTotal() {
            document.getElementById('d-origin').innerText = originTotal.toLocaleString();
            let finalPrice = originTotal - discountAmount;
            if(finalPrice < 0) finalPrice = 0;
            document.getElementById('d-total').innerText = finalPrice.toLocaleString();
        }

        function requestTossPay() {
            const info = JSON.parse(sessionStorage.getItem('orderInfo'));
            const cart = JSON.parse(localStorage.getItem('cart'));
            let finalPrice = originTotal - discountAmount;
            if(finalPrice < 0) finalPrice = 0;

            if(finalPrice === 0) return alert('결제 금액이 0원입니다.');

            const orderName = cart.length > 1 ? `${cart[0].name} 외 ${cart.length - 1}건` : cart[0].name;

            tossPayments.requestPayment('카드', {
                amount: finalPrice,
                orderId: 'ORDER_' + new Date().getTime(),
                orderName: orderName,
                customerName: info.name,
                successUrl: window.location.origin + '/pay.html',
                failUrl: window.location.origin + '/pay.html'
            }).catch(function (error) {
                if (error.code === 'USER_CANCEL') {
                    alert('결제를 취소하셨습니다.');
                } else {
                    alert(error.message);
                }
            });
        }

        async function processFinalOrder(paidAmount) {
            const info = JSON.parse(sessionStorage.getItem('orderInfo'));
            const cart = JSON.parse(localStorage.getItem('cart'));

            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: info.name,
                    address: info.address,
                    phone: info.phone,
                    items: cart,
                    totalAmount: parseInt(paidAmount).toLocaleString() + "원"
                })
            });

            if(res.ok) {
                alert('결제가 성공적으로 이뤄졌습니다');
                localStorage.removeItem('cart');
                sessionStorage.removeItem('orderInfo');
                location.href = 'my-orders.html';
            } else {
                alert('서버 저장 중 문제가 발생했습니다.');
            }
        }
    </script>
</body>
</html>

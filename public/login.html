<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>SSAFY Mall - 프리미엄 쇼핑의 시작</title>
    <meta property="og:title" content="SSAFY Mall">
    <meta property="og:description" content="개발자를 위한 최고의 장비, SSAFY Mall에서 만나보세요!">
    
    <style>
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 420px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 15px; }
        .form-group input { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 5px; box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace; font-size: 1rem;
        }
        .modal-title { margin-bottom: 20px; font-weight: 700; font-size: 1.2rem; color: var(--text-main); }
        .result-box { 
            margin-top:15px; padding: 15px; background-color: #f8fafc; border-radius: 8px; text-align:center; 
            min-height: 60px; display: flex; flex-direction: column; justify-content: center;
            transition: opacity 0.2s ease-in-out; opacity: 0;
        }
        .result-label { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px; }
        .result-value { font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: 0.5px; }
        .result-error { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#f1f5f9;">
    
    <div class="card" style="width:100%; max-width:400px; padding:40px; text-align:center;">
        <h1 style="color:var(--primary); font-weight:800; margin-bottom:10px;">SSAFY Mall</h1>
        <p style="color:var(--text-sub); margin-bottom:30px;">프리미엄 쇼핑의 시작</p>

        <div class="form-group">
            <input type="text" id="login-id" placeholder="아이디 (대/소문자 및 공백 주의)" onkeypress="if(event.key==='Enter') login()">
        </div>
        <div class="form-group">
            <input type="password" id="login-pw" placeholder="비밀번호" onkeypress="if(event.key==='Enter') login()">
        </div>
        <button class="btn btn-primary" style="width:100%; height:50px; font-size:1.1rem; margin-bottom:20px;" onclick="login()">로그인</button>

        <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:var(--text-sub);">
            <span style="cursor:pointer; transition:color 0.2s;" onclick="openModal('signup-modal')">회원가입</span>
            <div>
                <span style="cursor:pointer; margin-right:15px; transition:color 0.2s;" onclick="openModal('find-id-modal')">아이디 찾기</span>
                <span style="cursor:pointer; transition:color 0.2s;" onclick="openModal('find-pw-modal')">비밀번호 찾기</span>
            </div>
        </div>
    </div>

    <div id="signup-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">📝 회원가입</h3>
            
            <div class="form-group" style="display:flex; gap:10px;">
                <input type="text" id="signup-id" placeholder="아이디 (대/소문자 및 공백 주의)" style="flex:1;" oninput="resetIdCheck()">
                <button type="button" style="width:90px; border:1px solid #3b82f6; background:white; color:#3b82f6; border-radius:5px; cursor:pointer; font-weight:bold; font-size:0.9rem;" onclick="checkDuplicateId()">중복확인</button>
            </div>
            
            <div class="form-group"><input type="password" id="signup-pw" placeholder="비밀번호(영문/숫자/기호 조합 8자리 이상)"></div>
            <div class="form-group"><input type="text" id="signup-name" placeholder="이름(대/소문자 및 공백 주의)"></div>
            <div class="form-group"><input type="text" id="signup-phone" placeholder="핸드폰번호(숫자만 입력)" oninput="autoHyphen(this)" maxlength="13"></div>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" style="flex:1; height:45px;" onclick="signup()">가입하기</button>
                <button class="btn btn-outline" style="flex:1; height:45px;" onclick="closeModal('signup-modal')">취소</button>
            </div>
        </div>
    </div>

    <div id="find-id-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">🔍 아이디 찾기</h3>
            <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:15px;">성함과 번호를 정확히 입력해주세요.</p>
            <div class="form-group"><input type="text" id="find-id-name" placeholder="이름 (대/소문자 및 공백 주의)"></div>
            <div class="form-group"><input type="text" id="find-id-phone" placeholder="핸드폰 번호" oninput="autoHyphen(this)" maxlength="13"></div>
            <div id="find-id-result" class="result-box"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="find-id-submit-btn" class="btn btn-primary" style="flex:1; height:45px;" onclick="findId()">아이디 찾기</button>
                <button class="btn btn-outline" style="flex:1; height:45px;" onclick="closeModal('find-id-modal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="find-pw-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">🔑 비밀번호 찾기</h3>
            <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:15px;">아이디, 성함, 번호를 정확히 입력해주세요.</p>
            <div class="form-group"><input type="text" id="find-pw-id" placeholder="아이디 (대/소문자 및 공백 주의)"></div>
            <div class="form-group"><input type="text" id="find-pw-name" placeholder="이름 (대/소문자 및 공백 주의)"></div>
            <div class="form-group"><input type="text" id="find-pw-phone" placeholder="핸드폰 번호" oninput="autoHyphen(this)" maxlength="13"></div>
            <div id="find-pw-result" class="result-box"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="find-pw-submit-btn" class="btn btn-primary" style="flex:1; height:45px;" onclick="findPw()">비밀번호 찾기</button>
                <button class="btn btn-outline" style="flex:1; height:45px;" onclick="closeModal('find-pw-modal')">닫기</button>
            </div>
        </div>
    </div>

    <script>
        let foundUserIdTemp = ""; 
        let foundUserPwTemp = ""; 
        
        // 중복확인 완료 여부 저장 변수
        let isIdChecked = false; 

        // 사용자가 아이디를 수정하면 중복확인을 다시 하도록 초기화
        function resetIdCheck() {
            isIdChecked = false;
        }

        // ✨ [수정 완료] 에러 감지 레이더가 장착된 중복확인 함수
        async function checkDuplicateId() {
            const userId = document.getElementById('signup-id').value;
            if(!userId) return alert('아이디를 먼저 입력해주세요.');

            try {
                const res = await fetch('/api/check-id', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ userId }) 
                });

                // 서버가 정상적으로 대답하지 않았을 때 (404, 500 에러 등)
                if (!res.ok) {
                    throw new Error(`서버가 아파요! (에러 코드: ${res.status})`);
                }

                const data = await res.json();

                if(data.success) {
                    alert('사용 가능한 아이디입니다! ✅');
                    isIdChecked = true;
                } else {
                    alert('이미 사용 중인 아이디입니다. ❌ 다른 아이디를 입력해주세요.');
                    isIdChecked = false;
                    document.getElementById('signup-id').value = ""; // 중복이면 칸 비우기
                }
            } catch (error) {
                // 서버 통신 에러 발생 시 알림
                alert('🚨 서버 통신 에러 발생: ' + error.message + '\n\nRender 로그(CCTV)를 확인해보세요!');
            }
        }

        function openModal(id) { 
            const rb = document.getElementById(id.replace('-modal', '-result'));
            if(rb) { rb.innerHTML = ''; rb.style.opacity = '0'; }
            
            if(id === 'signup-modal') {
                isIdChecked = false; // 창 열때 초기화
            }

            if(id === 'find-id-modal') {
                const btn = document.getElementById('find-id-submit-btn');
                btn.innerText = '아이디 찾기'; btn.onclick = findId;
            }

            if(id === 'find-pw-modal') {
                const btn = document.getElementById('find-pw-submit-btn');
                btn.innerText = '비밀번호 찾기'; btn.onclick = findPw;
                if(foundUserIdTemp) {
                    document.getElementById('find-pw-id').value = foundUserIdTemp;
                }
            }
            document.getElementById(id).style.display = 'flex'; 
        }
        
        function closeModal(id) { 
            document.querySelectorAll(`#${id} input`).forEach(i => i.value = '');
            const rb = document.getElementById(id.replace('-modal', '-result'));
            if(rb) { rb.innerHTML = ''; rb.style.opacity = '0'; }
            document.getElementById(id).style.display = 'none'; 
        }

        function autoHyphen(t) {
            let v = t.value.replace(/[^0-9]/g, ''); 
            let r = v.length < 4 ? v : v.length < 8 ? v.substring(0,3)+"-"+v.substring(3) : v.substring(0,3)+"-"+v.substring(3,7)+"-"+v.substring(7,11);
            t.value = r;
        }

        async function login() {
            const userId = document.getElementById('login-id').value;
            const userPw = document.getElementById('login-pw').value;
            if(!userId || !userPw) return alert('정보를 입력해주세요.');
            const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, userPw}) });
            const data = await res.json();
            if(data.success) {
                if(userId === 'admin') location.href = '/admin';
                else location.href = 'display.html';
                foundUserIdTemp = ""; foundUserPwTemp = ""; 
            } else alert(data.message);
        }

        async function signup() {
            const userId = document.getElementById('signup-id').value;
            const userPw = document.getElementById('signup-pw').value;
            const userName = document.getElementById('signup-name').value;
            const userPhone = document.getElementById('signup-phone').value;
            
            if(!userId || !userPw || !userName || !userPhone) return alert('모든 항목을 입력해주세요.');
            
            // 중복확인을 안 했으면 가입 차단
            if(!isIdChecked) {
                return alert('아이디 중복확인 버튼을 눌러주세요!');
            }

            const res = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, userPw, userName, userPhone}) });
            const data = await res.json();
            if(data.success) { 
                alert('가입 완료! 환영합니다.'); 
                closeModal('signup-modal'); 
            } 
            else alert(data.message);
        }

        async function findId() {
            const name = document.getElementById('find-id-name').value;
            const phone = document.getElementById('find-id-phone').value;
            const rb = document.getElementById('find-id-result');
            const btn = document.getElementById('find-id-submit-btn');
            rb.style.opacity = '0';
            setTimeout(async () => {
                if(!name || !phone) { rb.innerHTML = '<span class="result-error">정보를 입력해주세요.</span>'; rb.style.opacity = '1'; return; }
                const res = await fetch('/api/find-id', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, phone}) });
                const data = await res.json();
                if(data.success) { 
                    foundUserIdTemp = data.userId; 
                    rb.innerHTML = `<div class="result-label">귀하의 아이디는 아래와 같습니다.</div><div class="result-value">${data.userId}</div>`; 
                    btn.innerText = '비밀번호 찾기';
                    btn.onclick = () => { 
                        document.getElementById('find-id-modal').style.display = 'none'; 
                        openModal('find-pw-modal'); 
                    };
                } else { rb.innerHTML = `<span class="result-error">${data.message}</span>`; foundUserIdTemp = ""; }
                rb.style.opacity = '1';
            }, 100);
        }

        async function findPw() {
            const userId = document.getElementById('find-pw-id').value;
            const name = document.getElementById('find-pw-name').value;
            const phone = document.getElementById('find-pw-phone').value;
            const rb = document.getElementById('find-pw-result');
            const btn = document.getElementById('find-pw-submit-btn');
            rb.style.opacity = '0';
            setTimeout(async () => {
                if(!userId || !name || !phone) { rb.innerHTML = '<span class="result-error">정보를 입력해주세요.</span>'; rb.style.opacity = '1'; return; }
                const res = await fetch('/api/find-pw', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, name, phone}) });
                const data = await res.json();
                if(data.success) { 
                    foundUserIdTemp = userId; 
                    foundUserPwTemp = data.userPw;
                    rb.innerHTML = `<div class="result-label">귀하의 비밀번호는 아래와 같습니다.</div><div class="result-value">${data.userPw}</div>`; 
                    btn.innerText = '로그인 하러 가기';
                    btn.onclick = () => {
                        document.getElementById('login-id').value = foundUserIdTemp;
                        document.getElementById('login-pw').value = foundUserPwTemp;
                        document.getElementById('find-pw-modal').style.display = 'none';
                    };
                } else { rb.innerHTML = `<span class="result-error">${data.message}</span>`; foundUserPwTemp = ""; }
                rb.style.opacity = '1';
            }, 100);
        }
    </script>
</body>
</html>

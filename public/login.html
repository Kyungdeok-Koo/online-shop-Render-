<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"> <title>SSAFY Mall - 프리미엄 쇼핑의 시작</title>
    
    <style>
        /* 화면 전용 레이아웃 스타일 */
        .wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* 오늘의집 스타일의 깔끔한 카드 (그림자 최소화, 테두리 강조) */
        .card, .modal-content { 
            background: var(--bg-card); 
            padding: 40px 30px; 
            border-radius: 6px; 
            width: 100%; max-width: 400px; 
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03); /* 아주 연한 그림자 */
        }
        
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; 
        }
        
        .form-group { margin-bottom: 12px; }
        .modal-title { margin-bottom: 25px; font-weight: 700; font-size: 1.3rem; color: var(--text-main); text-align: center; }
        
        .result-box { 
            margin-top:15px; padding: 20px; background-color: var(--bg-main); border: 1px solid var(--border-color); border-radius: 4px; text-align:center; 
            transition: opacity 0.2s ease-in-out; opacity: 0;
        }
        .result-label { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 8px; }
        .result-value { font-size: 1.3rem; font-weight: 800; color: var(--primary); letter-spacing: 0.5px; }
        .result-error { color: #FF5A5F; font-weight: 600; } /* 에러는 눈에 띄는 붉은색 */
        
        /* 하단 링크들 */
        .link-group { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-sub); margin-top: 20px; }
        .link-group span { cursor: pointer; transition: color 0.2s; }
        .link-group span:hover { color: var(--text-main); text-decoration: underline; }
    </style>
</head>
<body>
    
    <div class="wrapper">
        <div class="card">
            <h1 style="color:var(--primary); font-weight:800; font-size: 2rem; margin-bottom:5px; text-align:center; letter-spacing:-1px;">SSAFY Mall</h1>
            <p style="color:var(--text-sub); margin-bottom:30px; text-align:center; font-size:0.9rem;">개발자를 위한 프리미엄 쇼핑</p>

            <div class="form-group">
                <input type="text" id="login-id" placeholder="아이디" onkeypress="if(event.key==='Enter') login()">
            </div>
            <div class="form-group">
                <input type="password" id="login-pw" placeholder="비밀번호" onkeypress="if(event.key==='Enter') login()">
            </div>
            <button class="btn btn-primary" style="width:100%; height:50px; font-size:1.1rem; margin-top:10px;" onclick="login()">로그인</button>

            <div class="link-group">
                <span onclick="openModal('signup-modal')">회원가입</span>
                <div>
                    <span style="margin-right:15px;" onclick="openModal('find-id-modal')">아이디 찾기</span>
                    <span onclick="openModal('find-pw-modal')">비밀번호 찾기</span>
                </div>
            </div>
        </div>
    </div>

    <div id="signup-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">이메일로 회원가입</h3>
            
            <div class="form-group" style="display:flex; gap:8px;">
                <input type="text" id="signup-id" placeholder="아이디 입력" style="flex:1;" oninput="resetIdCheck()">
                <button type="button" class="btn btn-sub" style="width:90px;" onclick="checkDuplicateId()">중복확인</button>
            </div>
            
            <div class="form-group" style="display:flex; gap:8px;">
                <input type="password" id="signup-pw" placeholder="비밀번호 (영문/숫자/기호 8자 이상)" style="flex:1;" oninput="resetPwCheck()">
                <button type="button" class="btn btn-sub" style="width:90px;" onclick="checkPassword()">비번확인</button>
            </div>
            
            <div class="form-group"><input type="text" id="signup-name" placeholder="이름"></div>
            <div class="form-group"><input type="text" id="signup-phone" placeholder="핸드폰 번호 ('-' 없이 입력)" oninput="autoHyphen(this)" maxlength="13"></div>
            
            <div style="display:flex; gap:8px; margin-top:25px;">
                <button class="btn btn-outline" style="flex:1; height:45px;" onclick="closeModal('signup-modal')">취소</button>
                <button class="btn btn-primary" style="flex:1; height:45px;" onclick="signup()">가입하기</button>
            </div>
        </div>
    </div>

    <div id="find-id-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">아이디 찾기</h3>
            <div class="form-group"><input type="text" id="find-id-name" placeholder="가입하신 이름"></div>
            <div class="form-group"><input type="text" id="find-id-phone" placeholder="가입하신 핸드폰 번호" oninput="autoHyphen(this)" maxlength="13"></div>
            <div id="find-id-result" class="result-box"></div>
            <div style="display:flex; gap:8px; margin-top:25px;">
                <button class="btn btn-outline" style="flex:1; height:45px;" onclick="closeModal('find-id-modal')">닫기</button>
                <button id="find-id-submit-btn" class="btn btn-primary" style="flex:1; height:45px;" onclick="findId()">찾기</button>
            </div>
        </div>
    </div>

    <div id="find-pw-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">비밀번호 찾기</h3>
            <div class="form-group"><input type="text" id="find-pw-id" placeholder="가입하신 아이디"></div>
            <div class="form-group"><input type="text" id="find-pw-name" placeholder="가입하신 이름"></div>
            <div class="form-group"><input type="text" id="find-pw-phone" placeholder="가입하신 핸드폰 번호" oninput="autoHyphen(this)" maxlength="13"></div>
            <div id="find-pw-result" class="result-box"></div>
            <div style="display:flex; gap:8px; margin-top:25px;">
                <button class="btn btn-outline" style="flex:1; height:45px;" onclick="closeModal('find-pw-modal')">닫기</button>
                <button id="find-pw-submit-btn" class="btn btn-primary" style="flex:1; height:45px;" onclick="findPw()">찾기</button>
            </div>
        </div>
    </div>

    <script>
        // JS 기능 코드는 이전과 100% 동일하게 유지됩니다.
        let foundUserIdTemp = ""; 
        let foundUserPwTemp = ""; 
        
        let isIdChecked = false; 
        let isPwChecked = false;

        function resetIdCheck() { isIdChecked = false; }
        function resetPwCheck() { isPwChecked = false; }

        async function checkDuplicateId() {
            const userId = document.getElementById('signup-id').value;
            if(!userId) return alert('아이디를 먼저 입력해주세요.');

            try {
                const res = await fetch('/api/check-id', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) 
                });
                if (!res.ok) throw new Error(`서버 에러 (${res.status})`);
                const data = await res.json();
                if(data.success) {
                    alert('사용 가능한 아이디입니다! ✅');
                    isIdChecked = true;
                } else {
                    alert('이미 사용 중인 아이디입니다. ❌ 다른 아이디를 입력해주세요.');
                    isIdChecked = false;
                    document.getElementById('signup-id').value = ""; 
                }
            } catch (error) {
                alert('🚨 서버 통신 에러 발생: ' + error.message);
            }
        }

        function checkPassword() {
            const pw = document.getElementById('signup-pw').value;
            if (pw.length < 8) return alert("최소 8자리 이상의 비밀번호를 작성해주세요.");
            if (!/[a-zA-Z]/.test(pw)) return alert("영문을 추가하여 8자리 비밀번호를 작성해주세요.");
            if (!/[0-9]/.test(pw)) return alert("숫자를 추가하여 8자리 비밀번호를 작성해주세요.");
            if (!/[!@#$%^&*(),.?":{}|<>~_`\[\]\\\/\-+=]/.test(pw)) return alert("기호를 추가하여 8자리 비밀번호를 작성해주세요.");

            alert("사용 가능한 안전한 비밀번호입니다! ✅");
            isPwChecked = true;
        }

        function openModal(id) { 
            const rb = document.getElementById(id.replace('-modal', '-result'));
            if(rb) { rb.innerHTML = ''; rb.style.opacity = '0'; }
            
            if(id === 'signup-modal') { isIdChecked = false; isPwChecked = false; }
            if(id === 'find-id-modal') {
                const btn = document.getElementById('find-id-submit-btn');
                btn.innerText = '찾기'; btn.onclick = findId;
            }
            if(id === 'find-pw-modal') {
                const btn = document.getElementById('find-pw-submit-btn');
                btn.innerText = '찾기'; btn.onclick = findPw;
                if(foundUserIdTemp) document.getElementById('find-pw-id').value = foundUserIdTemp;
            }
            document.getElementById(id).style.display = 'flex'; 
        }
        
        function closeModal(id) { 
            document.querySelectorAll(`#${id} input`).forEach(i => i.value = '');
            const rb = document.getElementById(id.replace('-modal', '-result'));
            if(rb) { rb.innerHTML = ''; rb.style.opacity = '0'; }
            document.getElementById(id).style.display = 'none'; 
        }

        function autoHyphen(t) {
            let v = t.value.replace(/[^0-9]/g, ''); 
            let r = v.length < 4 ? v : v.length < 8 ? v.substring(0,3)+"-"+v.substring(3) : v.substring(0,3)+"-"+v.substring(3,7)+"-"+v.substring(7,11);
            t.value = r;
        }

        async function login() {
            const userId = document.getElementById('login-id').value;
            const userPw = document.getElementById('login-pw').value;
            if(!userId || !userPw) return alert('정보를 입력해주세요.');
            const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, userPw}) });
            const data = await res.json();
            if(data.success) {
                if(userId === 'admin') location.href = '/admin';
                else location.href = 'display.html';
                foundUserIdTemp = ""; foundUserPwTemp = ""; 
            } else alert(data.message);
        }

        async function signup() {
            const userId = document.getElementById('signup-id').value;
            const userPw = document.getElementById('signup-pw').value;
            const userName = document.getElementById('signup-name').value;
            const userPhone = document.getElementById('signup-phone').value;
            
            if(!userId || !userPw || !userName || !userPhone) return alert('모든 항목을 입력해주세요.');
            if(!isIdChecked) return alert('아이디 중복확인 버튼을 눌러주세요!');
            if(!isPwChecked) return alert('가입에 실패하였습니다.\n(비밀번호 조건을 확인해주세요)');

            const res = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, userPw, userName, userPhone}) });
            const data = await res.json();
            if(data.success) { alert('가입 완료! 환영합니다.'); closeModal('signup-modal'); } 
            else alert(data.message);
        }

        async function findId() {
            const name = document.getElementById('find-id-name').value;
            const phone = document.getElementById('find-id-phone').value;
            const rb = document.getElementById('find-id-result');
            const btn = document.getElementById('find-id-submit-btn');
            rb.style.opacity = '0';
            setTimeout(async () => {
                if(!name || !phone) { rb.innerHTML = '<span class="result-error">정보를 입력해주세요.</span>'; rb.style.opacity = '1'; return; }
                const res = await fetch('/api/find-id', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, phone}) });
                const data = await res.json();
                if(data.success) { 
                    foundUserIdTemp = data.userId; 
                    rb.innerHTML = `<div class="result-label">가입된 아이디</div><div class="result-value">${data.userId}</div>`; 
                    btn.innerText = '비밀번호 찾기';
                    btn.onclick = () => { document.getElementById('find-id-modal').style.display = 'none'; openModal('find-pw-modal'); };
                } else { rb.innerHTML = `<span class="result-error">${data.message}</span>`; foundUserIdTemp = ""; }
                rb.style.opacity = '1';
            }, 100);
        }

        async function findPw() {
            const userId = document.getElementById('find-pw-id').value;
            const name = document.getElementById('find-pw-name').value;
            const phone = document.getElementById('find-pw-phone').value;
            const rb = document.getElementById('find-pw-result');
            const btn = document.getElementById('find-pw-submit-btn');
            rb.style.opacity = '0';
            setTimeout(async () => {
                if(!userId || !name || !phone) { rb.innerHTML = '<span class="result-error">정보를 입력해주세요.</span>'; rb.style.opacity = '1'; return; }
                const res = await fetch('/api/find-pw', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, name, phone}) });
                const data = await res.json();
                if(data.success) { 
                    foundUserIdTemp = userId; foundUserPwTemp = data.userPw;
                    rb.innerHTML = `<div class="result-label">가입된 비밀번호</div><div class="result-value">${data.userPw}</div>`; 
                    btn.innerText = '로그인하러 가기';
                    btn.onclick = () => { document.getElementById('login-id').value = foundUserIdTemp; document.getElementById('login-pw').value = foundUserPwTemp; document.getElementById('find-pw-modal').style.display = 'none'; };
                } else { rb.innerHTML = `<span class="result-error">${data.message}</span>`; foundUserPwTemp = ""; }
                rb.style.opacity = '1';
            }, 100);
        }
    </script>
</body>
</html>

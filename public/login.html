<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SSAFY Mall | 프리미엄 가전/장비 쇼핑</title>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <div class="brand-logo" onclick="location.reload()">SSAFY Mall</div>
            <div class="brand-slogan">당신의 성장을 위한 프리미엄 장비의 시작</div>

            <div class="form-group">
                <input type="text" id="login-id" placeholder="아이디" onkeypress="if(event.key==='Enter') login()">
            </div>
            <div class="form-group">
                <input type="password" id="login-pw" placeholder="비밀번호" onkeypress="if(event.key==='Enter') login()">
            </div>
            <button class="btn btn-primary" onclick="login()">로그인</button>

            <div class="footer-links">
                <span onclick="openModal('find-id-modal')">아이디 찾기</span>
                <span onclick="openModal('find-pw-modal')">비밀번호 찾기</span>
                <span style="font-weight: 700;" onclick="openModal('signup-modal')">회원가입</span>
            </div>

            <div class="divider"><span>SNS 계정으로 간편 로그인</span></div>
            <div class="sns-group">
                <a href="/auth/kakao" class="sns-btn sns-kakao">Kakao 로그인</a>
                <a href="/auth/naver" class="sns-btn sns-naver">Naver 로그인</a>
                <a href="/auth/google" class="sns-btn sns-google">Google 로그인</a>
            </div>
        </div>
    </div>

    <footer style="padding: 40px 20px; background: #f7f9fa; color: #828c94; font-size: 12px; text-align: center; border-top: 1px solid #eaedef;">
        <div style="margin-bottom: 10px;">
            고객센터 1588-0000 | 평일 09:00~18:00 (점심시간 12:00~13:00)
        </div>
        <div style="margin-bottom: 10px;">
            <span>이용약관</span> | <span style="font-weight: bold;">개인정보 처리방침</span> | <span>공지사항</span>
        </div>
        <div>© 2026 SSAFY Mall. All rights reserved.</div>
    </footer>

    <div id="signup-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-weight: 800; margin-bottom: 30px; text-align: center;">이메일로 회원가입</h2>
            <div class="form-group" style="display:flex; gap:8px;">
                <input type="text" id="signup-id" placeholder="아이디" style="flex:1;" oninput="resetIdCheck()">
                <button type="button" style="width: 80px; border: 1px solid #35C5F0; background: white; color:#35C5F0; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="checkDuplicateId()">중복확인</button>
            </div>
            <div class="form-group" style="display:flex; gap:8px;">
                <input type="password" id="signup-pw" placeholder="비밀번호(영문/숫자/기호 8자 이상)" style="flex:1;" oninput="resetPwCheck()">
                <button type="button" style="width: 80px; border: 1px solid #35C5F0; background: white; color:#35C5F0; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="checkPassword()">비번확인</button>
            </div>
            <div class="form-group"><input type="text" id="signup-name" placeholder="이름"></div>
            <div class="form-group"><input type="text" id="signup-phone" placeholder="핸드폰번호" oninput="autoHyphen(this)" maxlength="13"></div>
            <button class="btn btn-primary" onclick="signup()">회원가입 완료</button>
            <button class="btn" style="background:none; color:var(--text-sub); font-size:14px; margin-top:10px; padding:0; height:auto;" onclick="closeModal('signup-modal')">취소</button>
        </div>
    </div>

    <div id="find-id-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; text-align:center;">아이디 찾기</h3>
            <div class="form-group"><input type="text" id="find-id-name" placeholder="이름"></div>
            <div class="form-group"><input type="text" id="find-id-phone" placeholder="핸드폰번호" oninput="autoHyphen(this)" maxlength="13"></div>
            <div id="find-id-result" style="margin: 15px 0; text-align: center; color: var(--primary); font-weight: bold; min-height: 20px;"></div>
            <button id="find-id-submit-btn" class="btn btn-primary" onclick="findId()">찾기</button>
            <button class="btn" style="background:none; color:var(--text-sub); font-size:14px; margin-top:10px; padding:0; height:auto;" onclick="closeModal('find-id-modal')">닫기</button>
        </div>
    </div>

    <div id="find-pw-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; text-align:center;">비밀번호 찾기</h3>
            <div class="form-group"><input type="text" id="find-pw-id" placeholder="아이디"></div>
            <div class="form-group"><input type="text" id="find-pw-name" placeholder="이름"></div>
            <div class="form-group"><input type="text" id="find-pw-phone" placeholder="핸드폰번호" oninput="autoHyphen(this)" maxlength="13"></div>
            <div id="find-pw-result" style="margin: 15px 0; text-align: center; color: var(--primary); font-weight: bold; min-height: 20px;"></div>
            <button id="find-pw-submit-btn" class="btn btn-primary" onclick="findPw()">찾기</button>
            <button class="btn" style="background:none; color:var(--text-sub); font-size:14px; margin-top:10px; padding:0; height:auto;" onclick="closeModal('find-pw-modal')">닫기</button>
        </div>
    </div>

    <script>
        /* 🚨 기존 기능 단 하나도 빠지지 않았습니다 🚨 */
        let foundUserIdTemp = ""; 
        let foundUserPwTemp = ""; 
        let isIdChecked = false; 
        let isPwChecked = false;

        function resetIdCheck() { isIdChecked = false; }
        function resetPwCheck() { isPwChecked = false; }

        async function checkDuplicateId() {
            const userId = document.getElementById('signup-id').value;
            if(!userId) return alert('아이디를 먼저 입력해주세요.');
            try {
                const res = await fetch('/api/check-id', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
                const data = await res.json();
                if(data.success) { alert('사용 가능한 아이디입니다! ✅'); isIdChecked = true; }
                else { alert('이미 사용 중인 아이디입니다. ❌ 다른 아이디를 입력해주세요.'); isIdChecked = false; document.getElementById('signup-id').value = ""; }
            } catch (error) { alert('🚨 서버 통신 에러 발생: ' + error.message); }
        }

        function checkPassword() {
            const pw = document.getElementById('signup-pw').value;
            if (pw.length < 8) return alert("최소 8자리 이상의 비밀번호를 작성해주세요.");
            if (!/[a-zA-Z]/.test(pw)) return alert("영문을 추가하여 8자리 비밀번호를 작성해주세요.");
            if (!/[0-9]/.test(pw)) return alert("숫자를 추가하여 8자리 비밀번호를 작성해주세요.");
            if (!/[!@#$%^&*(),.?":{}|<>~_`\[\]\\\/\-+=]/.test(pw)) return alert("기호를 추가하여 8자리 비밀번호를 작성해주세요.");
            alert("사용 가능한 안전한 비밀번호입니다! ✅"); isPwChecked = true;
        }

        function openModal(id) { 
            const rb = document.getElementById(id.replace('-modal', '-result'));
            if(rb) rb.innerText = '';
            if(id === 'signup-modal') { isIdChecked = false; isPwChecked = false; }
            if(id === 'find-id-modal') {
                const btn = document.getElementById('find-id-submit-btn');
                btn.innerText = '찾기'; btn.onclick = findId;
            }
            if(id === 'find-pw-modal') {
                const btn = document.getElementById('find-pw-submit-btn');
                btn.innerText = '찾기'; btn.onclick = findPw;
                if(foundUserIdTemp) document.getElementById('find-pw-id').value = foundUserIdTemp;
            }
            document.getElementById(id).style.display = 'flex'; 
        }

        function closeModal(id) { 
            document.querySelectorAll(`#${id} input`).forEach(i => i.value = '');
            const rb = document.getElementById(id.replace('-modal', '-result'));
            if(rb) rb.innerText = '';
            document.getElementById(id).style.display = 'none'; 
        }

        function autoHyphen(t) {
            let v = t.value.replace(/[^0-9]/g, ''); 
            let r = v.length < 4 ? v : v.length < 8 ? v.substring(0,3)+"-"+v.substring(3) : v.substring(0,3)+"-"+v.substring(3,7)+"-"+v.substring(7,11);
            t.value = r;
        }

        async function login() {
            const userId = document.getElementById('login-id').value;
            const userPw = document.getElementById('login-pw').value;
            if(!userId || !userPw) return alert('정보를 입력해주세요.');
            const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, userPw}) });
            const data = await res.json();
            if(data.success) {
                if(userId === 'admin') location.href = '/admin';
                else location.href = 'display.html';
                foundUserIdTemp = ""; foundUserPwTemp = ""; 
            } else alert(data.message);
        }

        async function signup() {
            const userId = document.getElementById('signup-id').value;
            const userPw = document.getElementById('signup-pw').value;
            const userName = document.getElementById('signup-name').value;
            const userPhone = document.getElementById('signup-phone').value;
            if(!userId || !userPw || !userName || !userPhone) return alert('모든 항목을 입력해주세요.');
            if(!isIdChecked) return alert('아이디 중복확인 버튼을 눌러주세요!');
            if(!isPwChecked) return alert('가입에 실패하였습니다.\n(비밀번호 조건을 확인해주세요)');

            const res = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, userPw, userName, userPhone}) });
            const data = await res.json();
            if(data.success) { alert('가입 완료! 환영합니다.'); closeModal('signup-modal'); } 
            else alert(data.message);
        }

        async function findId() {
            const name = document.getElementById('find-id-name').value;
            const phone = document.getElementById('find-id-phone').value;
            const res = await fetch('/api/find-id', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, phone}) });
            const data = await res.json();
            if(data.success) { 
                foundUserIdTemp = data.userId; 
                document.getElementById('find-id-result').innerText = `아이디: ${data.userId}`;
                document.getElementById('find-id-submit-btn').innerText = '비밀번호 찾기';
                document.getElementById('find-id-submit-btn').onclick = () => { closeModal('find-id-modal'); openModal('find-pw-modal'); };
            } else alert(data.message);
        }

        async function findPw() {
            const userId = document.getElementById('find-pw-id').value;
            const name = document.getElementById('find-pw-name').value;
            const phone = document.getElementById('find-pw-phone').value;
            const res = await fetch('/api/find-pw', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId, name, phone}) });
            const data = await res.json();
            if(data.success) { 
                foundUserIdTemp = userId; 
                foundUserPwTemp = data.userPw;
                document.getElementById('find-pw-result').innerText = `비밀번호: ${data.userPw}`;
                document.getElementById('find-pw-submit-btn').innerText = '로그인 하러 가기';
                document.getElementById('find-pw-submit-btn').onclick = () => { 
                    document.getElementById('login-id').value = foundUserIdTemp; 
                    document.getElementById('login-pw').value = foundUserPwTemp; 
                    closeModal('find-pw-modal'); 
                };
            } else alert(data.message);
        }
    </script>
<script>
    // 현재 사용자가 접속한 브라우저 환경을 확인합니다.
    const userAgent = navigator.userAgent.toLowerCase();
    
    // 카카오톡, 인스타그램, 네이버 등 인앱 브라우저인지 검사합니다.
    const isInAppBrowser = userAgent.match(/kakaotalk|instagram|naver/i);

    // 인앱 브라우저라면 경고창을 띄워 안내합니다.
    if (isInAppBrowser) {
        alert("안전한 소셜 로그인을 위해 우측 상단(또는 하단)의 [점 3개] 버튼을 눌러 '다른 브라우저로 열기(크롬, 사파리 등)'를 선택해 주세요!");
    }
</script>

</body>
</html>

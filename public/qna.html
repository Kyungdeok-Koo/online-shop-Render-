<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>1:1 고객센터</title>
</head>
<body>
    <div class="container">
        <header class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <h2>💬 1:1 프리미엄 고객센터</h2>
            <button class="btn btn-outline" onclick="location.href='display.html'">홈으로</button>
        </header>

        <div class="card" style="background:#f8fafc; border:1px solid #e2e8f0;">
            <h3 style="margin-bottom:15px;">새로운 문의 작성하기</h3>
            <input type="text" id="q-title" placeholder="제목을 입력하세요">
            <textarea id="q-content" placeholder="무엇을 도와드릴까요? 상세히 적어주세요." style="height:120px; resize:vertical;"></textarea>
            
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                <label style="cursor:pointer; display:flex; align-items:center; gap:5px; color:var(--text-sub); font-weight:bold;">
                    <input type="checkbox" id="q-secret" style="width:auto; margin:0;"> 비밀글로 보호하기
                </label>
                <button class="btn btn-primary" onclick="postQ()">문의 접수</button>
            </div>
        </div>

        <h3 style="margin: 30px 0 15px 0;">최근 문의 내역</h3>
        <div id="qna-list" class="card" style="padding:0;">
            </div>
    </div>
    <script>
        async function loadQna() {
            const res = await fetch('/api/qna');
            const data = await res.json();
            const list = document.getElementById('qna-list');
            
            if(data.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-sub);">등록된 문의가 없습니다.</div>';
                return;
            }

            list.innerHTML = data.reverse().map(q => `
                <div style="padding:24px; border-bottom:1px solid #f1f5f9;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <h4 style="font-size:1.1rem; color:var(--text-main);">${q.isSecret ? '🔒 관리자만 볼 수 있는 비밀글입니다.' : q.title}</h4>
                        <span class="badge ${q.answer ? 'badge-available' : 'badge-soldout'}" style="background:${q.answer ? '#10b981' : '#f59e0b'};">${q.answer ? '답변완료' : '처리중'}</span>
                    </div>
                    <p style="font-size:0.85rem; color:var(--text-sub); margin-bottom:15px;">작성자: ${q.userId} | ${q.date}</p>
                    ${!q.isSecret ? `<p style="background:#f8fafc; padding:15px; border-radius:8px; color:var(--text-main); margin-bottom:15px;">${q.content}</p>` : ''}
                    
                    ${q.answer ? `
                        <div style="background:#eff6ff; padding:15px; border-radius:8px; border-left:4px solid var(--primary);">
                            <strong style="color:var(--primary); display:block; margin-bottom:5px;">관리자 답변</strong>
                            <p style="color:var(--text-main);">${q.answer}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function postQ() {
            const body = {
                title: document.getElementById('q-title').value,
                content: document.getElementById('q-content').value,
                isSecret: document.getElementById('q-secret').checked
            };
            if(!body.title || !body.content) return alert('제목과 내용을 모두 입력해주세요.');

            await fetch('/api/qna', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify(body)
            });
            alert('문의가 접수되었습니다. 빠르게 답변해 드리겠습니다!');
            location.reload();
        }
        loadQna();
    </script>
</body>
</html>

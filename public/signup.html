<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>회원가입 - SSAFY Premium</title>
</head>
<body>
    <div class="container" style="max-width: 450px; margin-top: 5vh;">
        <div class="card" style="padding: 40px 30px;">
            <h2 style="text-align: center; margin-bottom: 30px; color:var(--text-main);">프리미엄 회원가입</h2>
            
            <label style="font-weight:bold; font-size:0.9rem; color:var(--text-sub);">이름 (실명)</label>
            <input type="text" id="userName" placeholder="홍길동" style="margin-bottom:15px;">
            
            <label style="font-weight:bold; font-size:0.9rem; color:var(--text-sub);">아이디</label>
            <input type="text" id="userId" placeholder="사용할 영문/숫자" style="margin-bottom:15px;">
            
            <label style="font-weight:bold; font-size:0.9rem; color:var(--text-sub);">비밀번호</label>
            <input type="password" id="userPw" placeholder="안전한 비밀번호" style="margin-bottom:25px;">
            
            <button class="btn btn-primary" style="width:100%; height:50px;" onclick="signup()">가입 완료하기</button>
            <p style="text-align:center; margin-top:20px; font-size:0.9rem;">
                <a href="login.html" style="color:var(--text-sub); text-decoration:none;">이미 계정이 있으신가요? 로그인</a>
            </p>
        </div>
    </div>
    <script>
        async function signup() {
            const data = {
                userName: document.getElementById('userName').value,
                userId: document.getElementById('userId').value,
                userPw: document.getElementById('userPw').value
            };
            if(!data.userName || !data.userId || !data.userPw) return alert("모든 항목을 입력하세요.");

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if(result.success) { alert("환영합니다! 로그인해주세요."); location.href='login.html'; }
            else { alert(result.message); }
        }
    </script>
</body>
</html>
